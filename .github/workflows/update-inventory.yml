# Optional backup path for manual inventory edits. The web app writes via the GitHub Contents API.
name: Update inventory

on:
  workflow_dispatch:
    inputs:
      secret:
        description: Household secret
        required: true
        type: string
      action:
        description: add, update, or delete
        required: true
        type: choice
        options:
          - add
          - update
          - delete
      payload:
        description: JSON payload for the item
        required: true
        type: string

concurrency:
  group: inventory
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secret
        env:
          EXPECTED: ${{ secrets.HOUSEHOLD_SECRET }}
        run: |
          if [ -z "$EXPECTED" ] || [ "${{ inputs.secret }}" != "$EXPECTED" ]; then
            echo "::error::Invalid household secret"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply inventory change
        env:
          INVENTORY_ACTION: ${{ inputs.action }}
          INVENTORY_PAYLOAD: ${{ inputs.payload }}
        run: node scripts/update-inventory.mjs

      - name: Commit and push
        run: |
          if git diff --quiet data/inventory.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/inventory.json
          git commit -m "inventory: ${{ inputs.action }} [skip deploy]"
          git push
